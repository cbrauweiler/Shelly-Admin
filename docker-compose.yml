services:
  backend:
    build: ./backend
    restart: unless-stopped
    env_file: .env
    environment:
      - PORT=3000
      - DATA_DIR=/data
    expose:
      - "3000"
    volumes:
      # Persistenz (Admin-Konto, Geraeteliste, Instanz-Secret). Bleibt ueber Updates erhalten.
      - ./data:/data

  frontend:
    build: ./frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      # Web-GUI erreichbar unter http://<nas-ip>:8090
      # (8080 ist auf der NAS von HomeDash belegt, 8088 von InfluxDB)
      - "8090:80"

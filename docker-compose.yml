services:
  backend:
    build: ./backend
    restart: unless-stopped
    # Werte kommen per ${VAR}-Interpolation:
    #  - lokal (docker compose up):   automatisch aus der .env im Projekt-Root
    #  - auf dem NAS (Portainer Git): aus den Stack-Environment-Variablen (Portainer-UI)
    # So funktioniert das GitOps-Deployment ohne .env im Repo (.env ist gitignored).
    # Map-Form (KEY: val) statt Listen-Form (- KEY=val): manche compose-Validatoren
    # (Synology Container Manager / aeltere compose-go) melden bei der Listen-Form mit
    # ${VAR}-Interpolation faelschlich "environment array items must be unique".
    environment:
      PORT: "3000"
      DATA_DIR: /data
      CONTROL_MODE: "${CONTROL_MODE:-full}"
      REFRESH_SECONDS: "${REFRESH_SECONDS:-15}"
      DEFAULT_SUBNET: "${DEFAULT_SUBNET:-}"
      DEVICE_TIMEOUT_MS: "${DEVICE_TIMEOUT_MS:-2500}"
      SCAN_TIMEOUT_MS: "${SCAN_TIMEOUT_MS:-900}"
      SCAN_CONCURRENCY: "${SCAN_CONCURRENCY:-48}"
      AUTH_SECRET: "${AUTH_SECRET:-}"
      AUTH_COOKIE_SECURE: "${AUTH_COOKIE_SECURE:-false}"
      AUTH_SESSION_HOURS: "${AUTH_SESSION_HOURS:-168}"
    expose:
      - "3000"
    volumes:
      # Absoluter Bind-Mount auf einen festen NAS-Pfad (NICHT relativ ./data): Bei
      # Portainer-GitOps liegt das geklonte Stack-Verzeichnis unter /data/compose/<id>
      # und wird bei jedem Update neu geklont -> ein relativer ./data-Mount existiert
      # dort nicht bzw. ginge beim Redeploy verloren. Der absolute Pfad persistiert
      # unabhaengig davon (Admin-Konto, Geraeteliste, Instanz-Secret).
      # Muss auf der NAS existieren: sudo mkdir -p /volume2/docker/shelly-admin
      - /volume2/docker/shelly-admin:/data

  frontend:
    build: ./frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      # Web-GUI erreichbar unter http://<nas-ip>:8083
      # (8080 ist auf der NAS von HomeDash belegt, 8088 von InfluxDB)
      - "8083:80"
